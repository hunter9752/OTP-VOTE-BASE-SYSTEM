<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="30" cy="30" r="24" fill="url(#gradient1)" opacity="0.2"/>
  
  <!-- Ballot Box Icon -->
  <rect x="18" y="24" width="24" height="18" rx="2" fill="url(#gradient1)"/>
  <rect x="18" y="20" width="24" height="5" rx="1.5" fill="#4f46e5"/>
  
  <!-- Ballot Paper -->
  <rect x="26" y="12" width="8" height="12" rx="1" fill="white" opacity="0.9"/>
  <line x1="28" y1="16" x2="32" y2="16" stroke="#6366f1" stroke-width="1"/>
  <line x1="28" y1="19" x2="32" y2="19" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Checkmark -->
  <circle cx="30" cy="30" r="6" fill="#10b981"/>
  <path d="M 27 30 L 29 32 L 33 28" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text: VoteSecure -->
  <text x="60" y="28" font-family="'Poppins', sans-serif" font-size="20" font-weight="700" fill="url(#gradient2)">
    VoteSecure
  </text>
  <text x="60" y="42" font-family="'Inter', sans-serif" font-size="9" font-weight="500" fill="#6b7280" letter-spacing="1">
    SECURE VOTING SYSTEM
  </text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
