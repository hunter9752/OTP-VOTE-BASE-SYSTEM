<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#gradient1)"/>
  
  <!-- Ballot Box -->
  <rect x="10" y="16" width="12" height="9" rx="1" fill="white" opacity="0.9"/>
  <rect x="10" y="13" width="12" height="3" rx="0.5" fill="white" opacity="0.7"/>
  
  <!-- Ballot Paper -->
  <rect x="14" y="8" width="4" height="6" rx="0.5" fill="white"/>
  <line x1="15" y1="10" x2="17" y2="10" stroke="#6366f1" stroke-width="0.5"/>
  <line x1="15" y1="12" x2="17" y2="12" stroke="#6366f1" stroke-width="0.5"/>
  
  <!-- Checkmark -->
  <circle cx="16" cy="16" r="4" fill="#10b981"/>
  <path d="M 14 16 L 15.5 17.5 L 18 15" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
