{% extends "base.html" %}

{% block title %}Login - Online Voting System{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2 class="form-title">Login to Vote</h2>
        <p class="form-subtitle">Enter your details to receive OTP</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" name="name" class="form-input" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
            </div>

            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-paper-plane"></i> Send OTP</button>
        </form>

        <div class="form-footer">
            <p>Already have an OTP? <a href="{{ url_for('verify_otp') }}">Verify here</a></p>
        </div>
    </div>
</div>
{% endblock %}
